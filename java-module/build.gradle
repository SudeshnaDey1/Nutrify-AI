plugins {
    id 'java'
    id 'application'
}

group 'com.nutrifyai'
version '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.8.1'
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.8.1'
}

application {
    mainClass = 'com.nutrifyai.calc.NutritionCalculator'
}

test {
    useJUnitPlatform()
}
